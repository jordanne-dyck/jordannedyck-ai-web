apiVersion: apps/v1
kind: Deployment
metadata:
  name: jordannedyck-ai
  labels:
    app: jordannedyck-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jordannedyck-ai
  template:
    metadata:
      labels:
        app: jordannedyck-ai
    spec:
      containers:
        - name: jordannedyck-ai
          image: REGISTRY_PLACEHOLDER/jordbot:v1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: openai-api-key
          volumeMounts:
            - name: faiss-db
              mountPath: /opt/app-root/src/faiss_db
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
      imagePullSecrets:
        - name: PULL_SECRET_PLACEHOLDER
      volumes:
        - name: faiss-db
          persistentVolumeClaim:
            claimName: faiss-db
